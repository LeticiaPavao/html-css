<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Mídia - HTML5 Complete</title>
</head>
<body>
    <header><h1>Mídia</h1></header>
    <nav>...</nav>
    <main>
        <h2>Imagens</h2>
        <figure>
            <img src="imagem.jpg" alt="Descrição da imagem" width="300" height="200" loading="lazy" srcset="imagem-2x.jpg 2x, imagem-3x.jpg 3x" sizes="(max-width: 600px) 300px, 500px">
            <figcaption>Legenda da imagem</figcaption>
        </figure>

        <picture>
            <source media="(min-width: 800px)" srcset="grande.jpg">
            <source media="(min-width: 400px)" srcset="media.jpg">
            <img src="pequena.jpg" alt="imagem responsiva">
        </picture>

        <h2>Áudio</h2>
        <audio controls autoplay muted loop preload="auto" src="audio.mp3">
            Seu navegador não suporta áudio.
        </audio>
        <!-- Alternativa com source -->
        <audio controls>
            <source src="audio.ogg" type="audio/ogg">
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <h2>Vídeo</h2>
        <video controls width="400" poster="capa.jpg" preload="metadata">
            <source src="video.mp4" type="video/mp4">
            <source src="video.webm" type="video/webm">
            <track kind="subtitles" src="legendas.vtt" srclang="pt" label="Português" default>
            Seu navegador não suporta vídeo.
        </video>

        <h2>Canvas</h2>
        <canvas id="meuCanvas" width="200" height="100" style="border:1px solid #000;"></canvas>
        <script>
            const canvas = document.getElementById('meuCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'red';
            ctx.fillRect(10,10,50,50);
        </script>

        <h2>SVG</h2>
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
        </svg>

        <h2>Iframe</h2>
        <iframe src="about.html" name="iframe1" width="300" height="200" sandbox="allow-scripts" loading="lazy"></iframe>

        <h2>Embed e Object</h2>
        <embed src="arquivo.pdf" type="application/pdf" width="300" height="200">
        <object data="arquivo.swf" type="application/x-shockwave-flash" width="300" height="200">
            <param name="quality" value="high">
            Fallback text.
        </object>

        <h2>Mapa de imagem</h2>
        <img src="mapa.png" alt="Mapa" usemap="#meumapa" width="400" height="300">
        <map name="meumapa">
            <area shape="rect" coords="0,0,100,100" href="index.html" alt="Início" target="_blank">
            <area shape="circle" coords="200,150,50" href="about.html" alt="Sobre" download>
        </map>
    </main>
    <footer>...</footer>
</body>
</html>
