<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Post Exemplo</title>
</head>
<body>
    <header><h1>Título do Post</h1></header>
    <nav>...</nav>
    <main>
        <article>
            <h2>Artigo principal</h2>
            <p>Conteúdo...</p>
        </article>
        <section id="comentarios">
            <h3>Comentários</h3>
            <article>
                <header><h4>Fulano disse:</h4></header>
                <p>Ótimo post!</p>
                <footer>Publicado em <time datetime="2025-03-19">19/03/2025</time></footer>
            </article>
            <form action="/enviar-comentario" method="post">
                <fieldset>
                    <legend>Deixe seu comentário</legend>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required minlength="3" maxlength="50" pattern="[A-Za-z ]+" title="Apenas letras e espaços">
                    <br>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@mail.com" required multiple>
                    <br>
                    <label for="site">Site:</label>
                    <input type="url" id="site" name="site" placeholder="https://exemplo.com">
                    <br>
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" min="1" max="120" step="1">
                    <br>
                    <label for="cor">Cor favorita:</label>
                    <input type="color" id="cor" name="cor" value="#ff0000">
                    <br>
                    <label for="data">Data:</label>
                    <input type="date" id="data" name="data">
                    <br>
                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" name="hora">
                    <br>
                    <label for="arquivo">Anexo:</label>
                    <input type="file" id="arquivo" name="arquivo" accept=".jpg,.png" multiple>
                    <br>
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" pattern="[0-9]{2}-[0-9]{9}" placeholder="99-999999999">
                    <br>
                    <label for="pesquisa">Pesquisa:</label>
                    <input type="search" id="pesquisa" name="pesquisa" placeholder="Buscar...">
                    <br>
                    <label for="comentario">Comentário:</label>
                    <textarea id="comentario" name="comentario" rows="5" cols="40" placeholder="Digite aqui..." maxlength="500"></textarea>
                    <br>
                    <label for="avaliacao">Avaliação:</label>
                    <select id="avaliacao" name="avaliacao" required>
                        <optgroup label="Positivo">
                            <option value="5">Excelente</option>
                            <option value="4">Bom</option>
                        </optgroup>
                        <optgroup label="Negativo">
                            <option value="1">Ruim</option>
                        </optgroup>
                    </select>
                    <br>
                    <label for="sugestao">Sugestão (autocomplete):</label>
                    <input list="sugestoes" id="sugestao" name="sugestao">
                    <datalist id="sugestoes">
                        <option value="Melhorar layout">
                        <option value="Mais exemplos">
                    </datalist>
                    <br>
                    <fieldset>
                        <legend>Preferências</legend>
                        <input type="checkbox" id="news" name="news" checked>
                        <label for="news">Receber newsletter</label>
                        <br>
                        <input type="radio" id="masc" name="genero" value="M">
                        <label for="masc">Masculino</label>
                        <input type="radio" id="fem" name="genero" value="F">
                        <label for="fem">Feminino</label>
                    </fieldset>
                    <br>
                    <label for="range">Nível de satisfação:</label>
                    <input type="range" id="range" name="range" min="0" max="10" value="5">
                    <br>
                    <output name="resultado" for="range">5</output>
                    <br>
                    <progress value="70" max="100">70%</progress>
                    <meter value="0.6" min="0" max="1" low="0.3" high="0.8">60%</meter>
                    <br>
                    <button type="submit" name="enviar" value="comentario" formaction="/enviar" formmethod="post" formtarget="_blank">Enviar</button>
                    <button type="reset" disabled>Limpar</button>
                    <button type="button" onclick="alert('Cancelado')">Cancelar</button>
                </fieldset>
            </form>
        </section>
    </main>
    <footer>...</footer>
</body>
</html>
