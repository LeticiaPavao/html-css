    <title>Tabelas</title>
</head>

<body>
    <header>
        <h1>Tabelas em HTML5</h1>
        <nav aria-label="Menu principal">
            <ul>
                <li><a href="index.html" title="Página inicial" target="_self">Início</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <table border="1" cellpadding="5" summary="Tabela de preços de produtos">
            <caption>Preços de produtos</caption>
            <colgroup>
                <col span="2" style="background-color:lightgray">
                <col style="background-color:yellow">
            </colgroup>
            <thead>
                <tr>
                    <th rowspan="2">Produto</th>
                    <th colspan="2">Preços</th>
                    <th rowspan="2">Estoque</th>
                </tr>
                <tr>
                    <th>À vista</th>
                    <th>Prazo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Notebook</td>
                    <td>R$ 3000</td>
                    <td>R$ 3300</td>
                    <td>10</td>
                </tr>
                <tr>
                    <td>Mouse</td>
                    <td>R$ 50</td>
                    <td>R$ 60</td>
                    <td>50</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4">Última atualização: 19/03/2025</td>
                </tr>
            </tfoot>
        </table>
    </main>
    <footer>
        <p>&copy; 2026 - Todos os direitos reservados.</p>
        <address>
            <a href="mailto:contato@exemplo.com" title="Envie um e-mail">contato@exemplo.com</a>
        </address>
    </footer>
</body>

</html>
